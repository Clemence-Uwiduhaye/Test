<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Metadata about the document -->
  <meta charset="UTF-8"> <!-- Character encoding set to UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive layout support -->

  <title>My Web Page</title> <!-- Page title shown in the browser tab -->

  <!-- Link to an external stylesheet -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon for the browser tab -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <!-- SEO metadata -->
  <meta name="description" content="A sample web page demonstrating the HTML head section.">

  <!-- Social media preview (Open Graph) -->
  <meta property="og:title" content="My Web Page">
  <meta property="og:description" content="A sample page showing head elements in HTML.">
  <meta property="og:image" content="thumbnail.jpg">

  <!-- Include structured data using microdata -->
  <meta itemscope itemtype="https://schema.org/WebPage">

  <!-- HTML comment example -->
  <!-- This is a comment: the browser ignores this text -->

</head>
<body>
  <h1>Welcome to My Web Page</h1>
  <p>This page uses a properly structured head section.</p>
</body>
</html>
